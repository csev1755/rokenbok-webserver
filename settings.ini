[webserver]

# IP address the server will listen on
listen_ip = 0.0.0.0

# Port the server will listen on
listen_port = 5001

# Configure video streams
enable_video = false

# Timeout for vehicle selections in seconds
player_timeout = 30

[smartport_arduino]

# COM port or device path of the SmartPort Arduino
serial_port = 

# Enabled SmartPort Arduino vehicle numbers and names (15 max)
[smartport_arduino.vehicles]
1 = 
2 = 
3 = 
4 = 
5 = 
6 = 
7 = 
8 = 

# Available go2rtc stream names and URLs (https://go2rtc.org/internal/ffmpeg/device/#configuration)
[video_streams]
Camera 1 = 
Camera 2 = 

[logging]
# Verbosity of the main application logs
main = WARNING
# Verbosity of Flask request/logging messages
flask = ERROR
# Verbosity of go2rtc internal logs
go2rtc = ERROR
# Enable log file
file = false
