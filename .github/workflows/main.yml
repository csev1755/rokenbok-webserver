name: Build with PyInstaller

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: win
          - os: macos-latest
            name: mac
          - os: macos-15-intel
            name: mac-intel

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          check-latest: true 

      - name: Build
        run: | 
          pip install -r requirements.txt
          pyinstaller rokenbok_webserver.spec
          mkdir staging
          cp dist/rokenbok_webserver* rokenbok_webserver.ini staging/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: rokenbok-webserver-${{ matrix.name }}
          path: staging/
