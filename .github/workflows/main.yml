name: Build with PyInstaller

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            download_name: win
            go2rtc_arch: win64
          - os: macos-latest
            download_name: mac
            go2rtc_arch: mac_arm64
          - os: macos-15-intel
            download_name: mac_intel
            go2rtc_arch: mac_amd64

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: astral-sh/setup-uv@v1
        with:
          version: latest

      - name: Build
        env:
          REF_NAME: ${{ github.ref_name }}
          GO2RTC_VERSION: '1.9.14'
          GO2RTC_ARCH: ${{ matrix.go2rtc_arch }}
        run: | 
          mkdir bin staging
          curl -L "https://github.com/AlexxIT/go2rtc/releases/download/v${GO2RTC_VERSION}/go2rtc_${GO2RTC_ARCH}.zip" -o go2rtc.zip
          unzip -o go2rtc.zip -d bin/
          EXECUTABLE=$(ls bin/go2rtc*)
          mv "$EXECUTABLE" "${EXECUTABLE%.*}"
          chmod +x bin/go2rtc
          uv sync
          uv run pyinstaller rokenbok_webserver.spec
          cp dist/rokenbok_webserver* rokenbok_webserver.ini staging/
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: rokenbok_webserver_${{ env.BUILD_STRING }}_${{ matrix.download_name }}
          path: staging/
