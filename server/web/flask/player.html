<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rokenbok WebServer</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background: black;
  }

  .stream-container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  {% if enable_video %}
  iframe.stream {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  {% endif %}

  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .panel {
    position: relative;
    width: 360px;
    max-height: 90%;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 16px;
    border-radius: 12px;
    user-select: none;
  }

  .floating-panel {
    pointer-events: auto;
    position: absolute;
    top: 20px;
    left: 20px;
  }

  select, button, input {
    margin: 5px 0;
    padding: 5px;
    width: 100%;
    box-sizing: border-box;
  }
  
  h1 {
    margin-top: 0;
  }

  .player {
    padding: 8px;
  }

  #players {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }

  #open-settings {
    width: auto;
    display: inline-block;
    padding: 0;
    margin: 0 0 0 4px;
    text-align: center;
    vertical-align: middle;
    color: rgb(220, 220, 220);
    cursor: pointer;
    line-height: 1;
    border: none;
    background: none;
  }

  #open-settings:hover {
    opacity: 0.7;
  }

  .settings-window {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .settings-window.hidden {
    display: none;
  }

  .settings-content h2 {
    margin-top: 0;
    margin-bottom: 12px;
  }

  .mapping-table {
    width: 100%;
    table-layout: fixed;
    border-collapse: collapse;
  }

  .mapping-table th,
  .mapping-table td {
    width: 33.33%;
    text-align: center;
    vertical-align: middle;
    padding: 6px 4px;
  }

  .mapping-table button {
    display: inline-block;
  }
</style>
</head>
<body>

<div class="stream-container">
  {% if enable_video %}
  <iframe id="stream-iframe" class="stream" src=""></iframe>
  {% endif %}
  <div class="overlay">
    <div class="floating-panel panel">
      {% if enable_video %}
      <div>
        <label>
          <strong>Camera:</strong>
        </label>
        <span id="stream-label" data-streams='{{ video_streams | tojson }}'>
          {{ video_streams.keys()|list|first }}
        </span>
      </div>
      {% endif %}
      <div id="players-section" class="players-section">
        <div class="players-header">
          <strong>Players:</strong>
        </div>
        <div id="players"></div>
      </div>
      <span>
        <button id="open-settings" type="button">Settings</button>
      </span>
    </div>
  </div>
</div>

<template id="player-template">
  <div class="player">
    <div><strong>Player Name:</strong> <span data-player-name></span></div>
    <div><strong>Selection:</strong> <span data-selection></span></div>
    <div><strong>Vehicle Name:</strong> <span data-vehicle-name></span></div>
  </div>
</template>

<div id="settings-window" class="settings-window hidden">
  <div class="settings-content panel">
    <h2>Player Settings</h2>
    <div>
      <label>
        <strong>Player Name:</strong>
        <input type="text" id="player_name">
      </label>
    </div>
    <div>
      <label>
        <strong>Input Device:</strong>
        <select id="input_device">
          <option value="gamepad">GAMEPAD</option>
          <option value="keyboard">KEYBOARD</option>
        </select>
      </label>
    </div>
    <div id="input"></div>
    <table class="mapping-table">
      <tbody id="mapping-body"></tbody>
    </table>
    <button id="save-settings" type="button">Save</button>
    <button id="cancel-settings" type="button">Cancel</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
<script src="/player.js"></script>

</body>
</html>
